gaps:
  - id: gap-desktop-work
    title: No polished Work / desktop super-app
    description: >
      Grok lacks an official native desktop application comparable to Claude Desktop
      (Chat + Cowork + Code) or OpenAI's ChatGPT desktop super-app with Work mode and
      integrated Codex. Web/mobile alone leave power users and knowledge-work workflows
      on competitor surfaces.
    competitorExamples:
      - Claude Desktop Chat/Cowork/Code (Anthropic)
      - ChatGPT Desktop Chat/Work/Codex (OpenAI, Jul 9 2026)
    grokStatus: missing
    revenueImpact: 5
    userDemand: 5
    competitiveUrgency: 5
    recommendedAction: >
      Ship Grok Desktop (macOS/Windows) with Chat + Work + Build tabs; unify agentic
      knowledge work and coding; match free/paid tier access messaging.
    ownerTeam: product
    status: open
    seeded: true
    sourceUrls:
      - https://openai.com/index/chatgpt-for-your-most-ambitious-work/
      - https://code.claude.com/docs/en/desktop

  - id: gap-cursor-migration
    title: Cursor capabilities not fully productized into Grok Build
    description: >
      SpaceX announced a $60B all-stock acquisition of Anysphere (Cursor) on Jun 16 2026,
      expected to close Q3 2026. Managed cloud agents, deep IDE, and enterprise coding tools
      must be migrated and productized into Grok Build and the broader Grok surface before
      competitors lock enterprise coding budgets.
    competitorExamples:
      - Cursor managed agents + IDE (Anysphere)
      - ChatGPT Work + Codex desktop
      - Claude Code / Desktop Code tab
    grokStatus: partial
    revenueImpact: 5
    userDemand: 5
    competitiveUrgency: 5
    recommendedAction: >
      Publish migration roadmap milestones; prioritize managed cloud agents, multi-repo IDE,
      enterprise controls, and single-brand Grok Build experience post-close.
    ownerTeam: eng
    status: in_progress
    seeded: true
    sourceUrls:
      - https://www.cnbc.com/2026/06/16/spacex-spcx-cursor-acquisition-ipo.html
      - https://www.reuters.com/legal/transactional/spacex-buy-anysphere-60-billion-2026-06-16/

  - id: gap-imagine-packaging
    title: Grok Imagine capable but under-packaged vs Codex hardware ecosystem
    description: >
      Grok Imagine (including Agent Mode canvas) is competitively strong on image/video,
      but lacks the hardware packaging and ecosystem amplification OpenAI applies to Codex
      via Codex Micro ($230 Work Louder macropad with agent status RGB and tactile controls).
    competitorExamples:
      - Codex Micro / Work Louder (OpenAI)
    grokStatus: partial
    revenueImpact: 3
    userDemand: 4
    competitiveUrgency: 3
    recommendedAction: >
      Launch creator hardware collab or first-party controller for Imagine/Build agents;
      amplify Agent Mode canvas in GTM; showcase end-to-end creative agent workflows.
    ownerTeam: product
    status: open
    seeded: true
    sourceUrls:
      - https://openai.com/supply/co-lab/work-louder/
      - https://x.ai/news/grok-imagine-api

  - id: gap-enterprise-visibility
    title: Enterprise offering exists but public visibility lags
    description: >
      Grok Business/Enterprise includes SSO, SCIM, RBAC, SOC2 and sales contact paths, but
      remains comparatively secretive vs competitors' public case studies, ROI calculators,
      and detailed product pages. This suppresses inbound enterprise demand and partner enablement.
    competitorExamples:
      - OpenAI enterprise pages and partner co-sell
      - Anthropic enterprise + Partner Hub
      - Google Cloud AI case studies
    grokStatus: partial
    revenueImpact: 5
    userDemand: 4
    competitiveUrgency: 4
    recommendedAction: >
      Publish detailed enterprise pages, named case studies (where allowed), ROI calculator,
      compliance matrix, and transparent sales motion for GTM.
    ownerTeam: gtm
    status: open
    seeded: true
    sourceUrls:
      - https://x.ai/grok/business

  - id: gap-partner-network
    title: No formal funded partner / consultant network
    description: >
      OpenAI Partner Network (Jun 14 2026) commits $150M and targets 300k certified consultants.
      Anthropic Claude Partner Network (Mar 2026) committed $100M with Services Track and Partner Hub.
      xAI lacks a comparable formal, well-funded, highly visible channel program.
    competitorExamples:
      - OpenAI Partner Network ($150M, 300k consultants)
      - Claude Partner Network ($100M)
    grokStatus: missing
    revenueImpact: 5
    userDemand: 3
    competitiveUrgency: 5
    recommendedAction: >
      Launch Grok Partner Network with multi-year funding, certification curriculum,
      co-sell mechanics, and public partner directory.
    ownerTeam: partnerships
    status: open
    seeded: true
    sourceUrls:
      - https://openai.com/index/introducing-openai-partner-network/
      - https://www.anthropic.com/news/services-track-partner-hub

  - id: gap-education
    title: No full online learning environment comparable to Google
    description: >
      Google's Gemini for Education, Gemini Academy, Cloud Skills Boost, and regular webinars
      form a complete learning environment for educators and professionals. Grok lacks a
      comparable structured Academy + webinar cadence.
    competitorExamples:
      - Gemini for Education / Academy / Cloud Skills Boost (Google)
    grokStatus: missing
    revenueImpact: 3
    userDemand: 3
    competitiveUrgency: 3
    recommendedAction: >
      Stand up Grok Academy with role-based paths (builder, educator, enterprise admin),
      monthly webinar series, and certification badges tied to partner program.
    ownerTeam: marketing
    status: open
    seeded: true
    sourceUrls:
      - https://edu.google.com
      - https://cloud.google.com/learn/training

  - id: gap-hackathons
    title: Limited hackathon and sponsorship scale
    description: >
      Grokathon exists but overall hosted/sponsored hackathon scale and visibility lag the
      competitive intensity of frontier AI community acquisition.
    competitorExamples:
      - OpenAI / Anthropic / Google / cloud provider hackathon calendars
    grokStatus: partial
    revenueImpact: 2
    userDemand: 3
    competitiveUrgency: 2
    recommendedAction: >
      Expand Grokathon cadence, prize pools, university and enterprise sponsorships;
      integrate Build + Imagine tracks.
    ownerTeam: marketing
    status: open
    seeded: true
    sourceUrls: []

  - id: gap-chinese-velocity
    title: Chinese open-weight cost and velocity pressure
    description: >
      DeepSeek V4-Pro/Flash (Apr 2026) and Moonshot Kimi K2.6 / K2.7-Code deliver frontier-adjacent
      quality with open weights, multi-agent coding loops, and aggressive cost — compressing
      API margins and accelerating agent builders outside Western closed ecosystems.
    competitorExamples:
      - DeepSeek V4-Pro / V4-Flash
      - Kimi K2.6 / K2.7-Code
      - Qwen3.6 open line
    grokStatus: partial
    revenueImpact: 4
    userDemand: 4
    competitiveUrgency: 5
    recommendedAction: >
      Maintain cost ladder and throughput leadership on API; optional distill/open strategy
      evaluation; dedicate PM dashboard to CN release velocity weekly.
    ownerTeam: product
    status: watching
    seeded: true
    sourceUrls:
      - https://api-docs.deepseek.com/news/news260424
      - https://www.kimi.com/blog/kimi-k2-6

