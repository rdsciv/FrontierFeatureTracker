gaps:
  - id: gap-open-weight-era
    title: No open-weight or distill response in the K3 / GLM-5.2 / Inkling era
    description: >
      July 2026 is defined by open-weight frontier parity: Kimi K3 (~2.8T, Jul 16), GLM-5.2 (MIT, long-horizon),
      and Inkling (Apache 2.0 multimodal, Jul 15). Builders, startups, and cost-sensitive enterprises can self-host
      near-frontier models. Grok remains closed-only with no announced distill/open ladder — this is a distribution
      and developer-share problem, not a marketing footnote.
    competitorExamples:
      - Kimi K3 open weights (Moonshot, Jul 2026)
      - GLM-5.2 MIT (Z.ai)
      - Inkling Apache 2.0 (Thinking Machines)
      - DeepSeek V4 MIT
    grokStatus: missing
    revenueImpact: 5
    userDemand: 5
    competitiveUrgency: 5
    recommendedAction: >
      Decide and ship a public response — full open, partial distill, or hybrid open small + closed flagship —
      with clear licensing and HF/API distribution within one release cycle. Silence cedes builder mindshare.
    ownerTeam: product
    status: open
    seeded: false
    sourceUrls:
      - https://www.cnbc.com/2026/07/17/moonshot-ai-kimi-k3-model-openai-anthropic-china.html
      - https://z.ai/blog/glm-5.2
      - https://thinkingmachines.ai/news/introducing-inkling/

  - id: gap-frontier-generation
    title: Public frontier generation lag vs GPT-5.6 Sol, Fable 5, and K3
    description: >
      Closed frontier jumped: Claude Fable 5 (Jun 9 / restored Jul 1) and GPT-5.6 Sol (Jul 9 GA) own the
      Western SOTA narrative for coding and long-horizon agents. K3 simultaneously owns open-weight narrative.
      Grok 4.5 is competitive on some agentic boards (e.g. Design Arena near GLM-5.2) but is not the default
      answer to "what's the current frontier model?" in Jul 2026 coverage.
    competitorExamples:
      - GPT-5.6 Sol (OpenAI, Jul 9)
      - Claude Fable 5 (Anthropic)
      - Kimi K3 (Moonshot)
    grokStatus: partial
    revenueImpact: 5
    userDemand: 5
    competitiveUrgency: 5
    recommendedAction: >
      Publish transparent coding/agent benchmarks vs Sol and Fable; accelerate next flagship or Grok Build
      specialized SOTA claims with eval harnesses journalists can reproduce.
    ownerTeam: product
    status: open
    seeded: false
    sourceUrls:
      - https://openai.com/index/gpt-5-6/
      - https://www.anthropic.com/claude/fable
      - https://thinkingmachines.ai/news/introducing-inkling/

  - id: gap-agentic-coding-product
    title: Agentic coding product incomplete vs Codex Work, Claude Code, and open SWE agents
    description: >
      Token spend and enterprise ARR growth concentrate in coding agents. OpenAI packaged Sol into ChatGPT Work + Codex;
      Anthropic into Claude Code/Desktop; open models (GLM-5.2, K3, Inkling) flood self-host agent harnesses.
      Grok Build + grok-build-0.1 exist, but managed cloud agents, IDE depth, and Cursor productization remain incomplete
      pre-close (Q3 2026).
    competitorExamples:
      - ChatGPT Work + Codex (Jul 9)
      - Claude Code / Desktop Code tab
      - GLM-5.2 long-horizon coding
      - Cursor managed agents
    grokStatus: partial
    revenueImpact: 5
    userDemand: 5
    competitiveUrgency: 5
    recommendedAction: >
      Ship explicit Grok Build product milestones weekly through Cursor close; managed agents + multi-repo IDE +
      public coding leaderboard placement.
    ownerTeam: eng
    status: in_progress
    seeded: false
    sourceUrls:
      - https://openai.com/index/chatgpt-for-your-most-ambitious-work/
      - https://z.ai/blog/glm-5.2
      - https://www.cnbc.com/2026/06/16/spacex-spcx-cursor-acquisition-ipo.html

  - id: gap-cn-cost-velocity
    title: Cost ladder and release cadence vs Chinese open MoE velocity
    description: >
      DeepSeek V4 set the cost floor; GLM-5.2 claims ~1/6 US API cost on long-horizon coding; K3 demand crashed
      capacity within days of launch — proof of global appetite for cheap frontier-adjacent intelligence.
      Grok must win price/perf and throughput narratives or lose agent-builder volume permanently.
    competitorExamples:
      - DeepSeek V4-Pro/Flash
      - GLM-5.2 cost claims
      - Kimi K3 capacity crisis / demand
    grokStatus: partial
    revenueImpact: 4
    userDemand: 5
    competitiveUrgency: 5
    recommendedAction: >
      Publish price/perf ladder (flagship + Build + economy), throughput SLAs, and weekly CN competitive briefings
      for PMs. Optional open distill if closed-only loses share.
    ownerTeam: product
    status: watching
    seeded: false
    sourceUrls:
      - https://www.euronews.com/next/2026/07/20/chinese-ai-model-kimi-k3-halts-new-signups-amid-skyrocketing-demand
      - https://api-docs.deepseek.com/news/news260424

