models:
  - id: kimi-k3
    companyId: moonshot
    name: Kimi K3
    slug: kimi-k3
    releaseDate: "2026-07-16"
    status: ga
    paramsTotal: "2.8T"
    paramsActive: "~50B est. (16 of 896 experts)"
    moe: true
    contextWindow: "1M"
    modalities: [text, image, tools]
    openWeights: true
    license: "Open weights targeted 2026-07-27; API live"
    apiInputPerM: 3.0
    apiOutputPerM: 15.0
    capabilityDelta: >
      WAIC Shanghai launch. MoE 2.8T total; ~16/896 experts active. Official blog: still trails Fable 5
      and GPT-5.6 Sol overall but tops many other models; independent Arena/AA ranks often top-3.
      API ~$0.30 cache-hit / $3 miss / $15 out per M. New consumer signups paused ~Jul 19 from demand.
      Full weights promised ~Jul 27. Supersedes K2.6/K2.7 as current Moonshot frontier.
    sourceUrls:
      - https://www.kimi.com/blog/kimi-k3
      - https://www.cnbc.com/2026/07/17/moonshot-ai-kimi-k3-model-openai-anthropic-china.html
      - https://www.euronews.com/next/2026/07/20/chinese-ai-model-kimi-k3-halts-new-signups-amid-skyrocketing-demand
    lastVerifiedAt: "2026-07-23"
    notes: "Active-param estimate is community (2.8T×16/896), not official single number." 

